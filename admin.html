<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0c1118">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Proofingo">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Admin — Proofingo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0c1118; --bg2:#131a24; --bg3:#1a2232;
  --amber:#00cfe8; --amber-dim:#0098b0; --amber-dark:#061525;
  --text:#eef2f6; --text-dim:#7a8fa8; --text-muted:#7a8fa8;
  --border:#1e2d40; --red:#ff6b6b; --green:#00cfe8;
  --font:'Courier New',Courier,monospace;
}
html,body { min-height:100%; min-height:100dvh; background:var(--bg); color:var(--text); font-family:var(--font); }
body::before {
  content:''; position:fixed; inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.045) 1px,transparent 1px);
  background-size:40px 40px; pointer-events:none; z-index:0;
}
.page { position:relative; z-index:1; max-width:600px; margin:0 auto; padding:calc(20px + env(safe-area-inset-top)) 16px calc(80px + env(safe-area-inset-bottom)); }

/* Nav */
.topnav { display:flex; align-items:center; gap:12px; margin-bottom:28px; flex-wrap:wrap; }
.topnav a,.topnav button.nav-link { color:var(--text-muted); text-decoration:none; font-size:11px; letter-spacing:2px; background:none; border:none; cursor:pointer; padding:0; }
.topnav a:hover,.topnav button.nav-link:hover { color:var(--amber); }
.topnav h1 { font-size:20px; font-weight:900; color:var(--amber); letter-spacing:-1px; margin-left:auto; }

/* Section labels */
.section-label { font-size:10px; letter-spacing:4px; color:var(--text-muted); text-transform:uppercase; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }

/* Form elements */
.field { margin-bottom:18px; }
label { display:block; font-size:10px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px; }
input[type="text"], textarea {
  width:100%; padding:11px 13px; background:var(--bg2); border:2px solid var(--border); border-radius:4px;
  color:var(--text); font-family:var(--font); font-size:16px; outline:none; transition:border-color .15s;
}
@media (min-width:400px) {
  input[type="text"], textarea { font-size:13px; }
}
input[type="text"]:focus, textarea:focus { border-color:var(--amber-dim); }
input::placeholder, textarea::placeholder { color:var(--text-muted); opacity:1; }

/* Buttons */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:14px 20px; min-height:48px; font-family:var(--font); font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; cursor:pointer; border-radius:4px; transition:all .15s; touch-action:manipulation; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
.btn-full { width:100%; }
.btn-amber { background:var(--amber); color:var(--bg); border:2px solid var(--amber); }
.btn-amber:hover:not(:disabled) { background:#33dff0; }
.btn-amber:disabled { opacity:.35; cursor:not-allowed; }
.btn-outline { background:transparent; color:var(--amber); border:2px solid var(--border); }
.btn-outline:hover:not(:disabled) { border-color:var(--amber); }
.btn-outline:disabled { opacity:.35; cursor:not-allowed; }
.btn-danger { background:transparent; color:var(--red); border:2px solid var(--border); }
.btn-danger:hover { border-color:var(--red); }
.btn-sm { padding:7px 12px; font-size:10px; letter-spacing:2px; }
.btn-green { background:transparent; color:var(--green); border:2px solid var(--border); }
.btn-green:hover { border-color:var(--green); }
.btn-override { background:transparent; color:#f5c400; border:2px solid var(--border); }
.btn-override:hover { border-color:#f5c400; }

/* Confirmation modal */
#confirm-modal { display:none; position:fixed; inset:0; z-index:200; align-items:center; justify-content:center; padding:24px; }
#confirm-modal.show { display:flex; }
#confirm-modal-backdrop { position:absolute; inset:0; background:rgba(8,14,22,0.88); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
.confirm-box { position:relative; z-index:1; background:var(--bg2); border:2px solid var(--border); border-radius:8px; padding:28px 24px 22px; max-width:360px; width:100%; box-shadow:0 16px 48px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05); }
.confirm-icon { font-size:36px; text-align:center; margin-bottom:14px; }
.confirm-title { font-size:15px; font-weight:900; color:#f5c400; letter-spacing:-0.5px; margin-bottom:10px; text-align:center; }
.confirm-body { font-size:12px; color:var(--text-muted); letter-spacing:.5px; line-height:1.7; text-align:center; margin-bottom:22px; }
.confirm-actions { display:flex; gap:10px; }
.confirm-actions .btn { flex:1; }

/* Alert */
.alert { padding:11px 13px; border-radius:4px; font-size:11px; letter-spacing:1px; margin-bottom:16px; display:none; }
.alert.show { display:block; }
.alert-error { background:rgba(255,80,80,0.12); border:1px solid #ff5050; color:#ff8080; }
.alert-success { background:rgba(0,207,232,0.08); border:1px solid var(--amber-dim); color:var(--amber); }

/* Spinner */
.spinner { display:inline-block; width:13px; height:13px; border:2px solid rgba(0,207,232,0.2); border-top-color:var(--amber); border-radius:50%; animation:spin .6s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Player rows */
.player-setup-row { display:flex; align-items:center; gap:10px; background:var(--bg2); border:2px solid var(--border); border-radius:4px; padding:10px 12px; margin-bottom:8px; box-shadow:0 2px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03); }
.player-setup-row .dot { width:13px; height:13px; border-radius:50%; flex-shrink:0; }
.player-setup-row .slot { font-size:10px; color:var(--text-muted); letter-spacing:1px; flex-shrink:0; }
.player-setup-row input { flex:1; background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--text); font-family:var(--font); font-size:13px; outline:none; padding:2px 0; }
.player-setup-row input:focus { border-bottom-color:var(--amber-dim); }

/* Invite rows */
.invite-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
.invite-row:last-child { border-bottom:none; }
.invite-row .dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.invite-row-name { font-size:14px; font-weight:700; color:var(--text); flex:1; }
.invite-row-actions { display:flex; gap:6px; flex-shrink:0; }

/* Group ID box */
.group-id-box { background:var(--amber-dark); border:2px solid var(--amber-dim); border-radius:5px; padding:14px 16px; margin-bottom:20px; box-shadow:0 4px 18px rgba(0,0,0,0.45), 0 0 12px rgba(0,152,176,0.12), inset 0 1px 0 rgba(0,207,232,0.08); }
.group-id-label { font-size:9px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px; }
.group-id-value { font-size:12px; color:var(--amber); word-break:break-all; letter-spacing:1px; margin-bottom:8px; }
.group-id-hint { font-size:10px; color:var(--text-muted); letter-spacing:1px; }

/* Games list */
.game-card { background:var(--bg2); border:2px solid var(--border); border-radius:5px; padding:14px 16px; margin-bottom:10px; box-shadow:0 4px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04); transition:box-shadow .2s, border-color .2s; }
.game-card.active-game { border-color:var(--amber); box-shadow:0 4px 20px rgba(0,0,0,0.45), 0 0 16px rgba(0,207,232,0.22), inset 0 1px 0 rgba(255,255,255,0.06); }
.game-card-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.game-name { font-size:15px; font-weight:700; color:var(--text); flex:1; }
.badge { font-size:9px; letter-spacing:2px; padding:3px 8px; border-radius:2px; font-weight:900; text-transform:uppercase; }
.badge-active { background:var(--amber); color:var(--bg); }
.badge-setup { background:rgba(0,180,210,0.15); color:#5ad4e8; border:1px solid rgba(0,180,210,0.40); }
.badge-finished { background:rgba(74,94,114,0.15); color:#4a5e72; border:1px solid rgba(74,94,114,0.35); }
.game-card-actions { display:flex; gap:6px; flex-wrap:wrap; }
.game-meta { font-size:10px; color:var(--text-muted); letter-spacing:1px; margin-bottom:8px; }

/* Game editor */
.sq-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-bottom:20px; }
.sq-wrap { position:relative; }
.sq-pos { position:absolute; top:3px; left:4px; font-size:8px; color:var(--text-muted); pointer-events:none; z-index:1; }
.sq-ta {
  width:100%; aspect-ratio:1; padding:13px 4px 4px; background:var(--bg2);
  border:2px solid var(--border); border-radius:4px; color:var(--text);
  font-family:var(--font); font-size:clamp(11px,3vw,15px); font-weight:600;
  text-align:center; resize:none; outline:none; line-height:1.3; transition:border-color .15s;
}
.sq-ta:focus { border-color:var(--amber-dim); }
.sq-free { aspect-ratio:1; display:flex; align-items:center; justify-content:center; background:var(--amber-dark); border:2px solid var(--amber-dim); border-radius:4px; color:var(--amber); font-size:11px; font-weight:900; text-align:center; line-height:1.3; }

/* Views */
.view { display:none; }
.view.active { display:block; }

/* Play banner player buttons */
.play-btn { display:inline-flex; align-items:center; gap:8px; padding:10px 16px; background:var(--bg2); border:2px solid var(--border); border-radius:5px; color:var(--text); font-family:var(--font); font-size:13px; font-weight:700; cursor:pointer; text-decoration:none; transition:border-color .15s, box-shadow .15s, transform .15s; touch-action:manipulation; -webkit-tap-highlight-color:transparent; box-shadow:0 4px 14px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04); }
.play-btn:hover { border-color:var(--amber); box-shadow:0 6px 20px rgba(0,0,0,0.5), 0 0 10px rgba(0,207,232,0.15), inset 0 1px 0 rgba(255,255,255,0.06); transform:translateY(-2px); }
.play-btn .dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }

/* Scoreboard preview */
.sb-row { display:flex; align-items:center; gap:10px; padding:10px 12px; margin-bottom:6px; background:var(--bg2); border:2px solid var(--border); border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03); }
.sb-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.sb-name { font-size:13px; font-weight:700; color:var(--text); flex:1; }
.sb-bar-bg { flex:2; background:var(--border); border-radius:2px; height:6px; overflow:hidden; }
.sb-bar-fill { height:100%; background:var(--amber-dim); border-radius:2px; transition:width .4s ease; }
.sb-bar-fill.bingo { background:var(--amber); }
.sb-count { font-size:10px; color:var(--text-muted); letter-spacing:1px; min-width:60px; text-align:right; }
.sb-bingo { font-size:10px; letter-spacing:1px; color:var(--bg); background:var(--amber); padding:3px 7px; border-radius:2px; font-weight:900; white-space:nowrap; }
.sb-first-line { font-size:10px; letter-spacing:1px; color:var(--bg); background:#7a8fa8; padding:3px 7px; border-radius:2px; font-weight:900; white-space:nowrap; }
.sb-first-diag { font-size:10px; letter-spacing:1px; color:var(--bg); background:#5ad4e8; padding:3px 7px; border-radius:2px; font-weight:900; white-space:nowrap; }

/* Scoreboard game tabs */
.sb-tabs { display:flex; gap:0; border-bottom:2px solid var(--border); overflow-x:auto; margin-bottom:14px; -webkit-overflow-scrolling:touch; }
.sb-tab { padding:9px 14px; font-family:var(--font); font-size:10px; letter-spacing:2px; font-weight:700; text-transform:uppercase; cursor:pointer; color:var(--text-muted); background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-2px; white-space:nowrap; transition:color .15s, border-color .15s; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
.sb-tab.active { color:var(--amber); border-bottom-color:var(--amber); }
.sb-tab:hover:not(.active) { color:var(--text); }
</style>
</head>
<body>
<div class="page">
  <div class="topnav">
    <a href="index.html">← HOME</a>
    <span style="color:var(--border)">|</span>
    <button class="nav-link" id="nav-dashboard" onclick="showDashboard()" style="display:none">DASHBOARD</button>
    <h1 id="page-title">ADMIN</h1>
  </div>

  <div id="global-alert" class="alert"></div>

  <!-- ============================================================
       VIEW: NEW GROUP SETUP
       ============================================================ -->
  <div class="view active" id="view-setup">
    <div class="section-label">Create New Group</div>
    <div class="field">
      <label>Group Name</label>
      <input type="text" id="group-name" placeholder="e.g. Q3 Implementation Team" maxlength="60">
    </div>
    <div class="field">
      <label>Your Name (Admin)</label>
      <input type="text" id="admin-name" placeholder="e.g. Derek" maxlength="30">
    </div>

    <div class="section-label" style="margin-top:24px">Add Other Players (up to 4)</div>
    <div id="player-setup-rows"></div>
    <div style="font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-bottom:20px">You're already in as player 1. Add at least 1 other player.</div>

    <button class="btn btn-amber btn-full" id="btn-create-group" onclick="createGroup()">Create Group &amp; Get Invite Links →</button>
  </div>

  <!-- ============================================================
       VIEW: DASHBOARD
       ============================================================ -->
  <div class="view" id="view-dashboard">

    <!-- Group Name Header -->
    <div style="margin-bottom:28px;">
      <div style="font-size:10px;letter-spacing:4px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;">Group</div>
      <div id="dash-group-name-display" style="font-size:clamp(24px,6vw,36px);font-weight:900;color:var(--amber);letter-spacing:-1px;line-height:1.1;word-break:break-word;margin-bottom:14px;"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <button class="btn btn-sm btn-outline" onclick="copyGroupId()">Copy Group ID</button>
        <button class="btn btn-sm btn-outline" onclick="copyAdminLink()">Copy Admin Link</button>
        <button class="btn btn-sm btn-danger" onclick="endGroup()" style="margin-left:auto">⊗ End Group</button>
      </div>
    </div>

    <!-- Play Your Board banner (shown when a game is active) -->
    <div id="play-banner" style="display:none;margin-bottom:24px">
      <a id="play-lobby-btn" href="#" class="btn btn-amber btn-full">🎯 Join Game Lobby →</a>
    </div>

    <!-- Players & Invite Links -->
    <div class="section-label">Player Invite Links</div>
    <div id="invite-cards"></div>

    <!-- Games -->
    <div class="section-label" style="margin-top:28px;display:flex;align-items:center;justify-content:space-between">
      <span>Games</span>
      <button class="btn btn-sm btn-amber" onclick="showGameEditor(null)">+ New Game</button>
    </div>
    <div id="games-list"></div>

    <!-- Live Scoreboard (for active game) -->
    <div id="scoreboard-section" style="display:none">
      <div class="section-label" style="margin-top:28px">Live Scores — <span id="sb-game-name" style="color:var(--amber)"></span></div>
      <div id="sb-game-tabs" class="sb-tabs" style="display:none"></div>
      <div id="admin-scoreboard"></div>
    </div>
  </div>

  <!-- ============================================================
       VIEW: GAME EDITOR
       ============================================================ -->
  <div class="view" id="view-game-editor">
    <div class="section-label" id="editor-title">New Game</div>
    <div class="field">
      <label>Game Name</label>
      <input type="text" id="game-name-input" placeholder="e.g. Round 1 — Change Mgmt" maxlength="60">
    </div>
    <div style="font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-bottom:12px">Fill all 9 squares.</div>
    <div class="sq-grid" id="editor-grid"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-amber btn-full" id="btn-save-activate" onclick="saveGame(true)">Save &amp; Activate 🎯</button>
      <button class="btn btn-outline btn-full" onclick="saveGame(false)">Save as Draft</button>
      <button class="btn btn-outline btn-full" onclick="showDashboard()">Cancel</button>
    </div>
  </div>

</div>

<!-- Generic confirmation modal -->
<div id="confirm-modal">
  <div id="confirm-modal-backdrop" onclick="closeConfirmModal()"></div>
  <div class="confirm-box" id="confirm-box">
    <div class="confirm-icon" id="confirm-icon"></div>
    <div class="confirm-title" id="confirm-title"></div>
    <div class="confirm-body" id="confirm-body"></div>
    <div class="confirm-actions">
      <button class="btn btn-outline btn-sm" onclick="closeConfirmModal()">Cancel</button>
      <button class="btn btn-sm" id="confirm-action-btn" onclick="runConfirmAction()"></button>
    </div>
  </div>
</div>

<script>
// ================================================================
// Persist admin group IDs (supports multiple groups)
// ================================================================
function saveAdminGroup(gid) {
  localStorage.setItem('bingo_admin_gid', gid);
  const index = JSON.parse(localStorage.getItem('bingo_admin_index') || '[]');
  if (!index.includes(gid)) { index.push(gid); localStorage.setItem('bingo_admin_index', JSON.stringify(index)); }
}

// ================================================================
// State
// ================================================================
let groupId      = null;
let groupName    = null;
let adminName    = null;
let allPlayers   = [];
let allGames     = [];
let editingGameId = null;
let allMarks     = {};
let activeGameId = null;
let scoreboardGameId = null;
let adminFirstStraightId = null;
let adminFirstDiagId     = null;
let adminCheckedInIds    = new Set();
let realtimeChannel = null;

// ----------------------------------------------------------------
// Boot — check for ?gid= in URL or localStorage
// ----------------------------------------------------------------
window.addEventListener('DOMContentLoaded', async () => {
  buildPlayerSetupRows();

  const params = new URLSearchParams(location.search);
  const urlGid = params.get('gid');
  const isNew  = params.get('new') === '1';

  if (!isNew && urlGid) {
    groupId = urlGid;
    const ok = await loadGroup();
    if (ok) { switchView('dashboard'); return; }
  }

  switchView('setup');
});

// ----------------------------------------------------------------
// View switching
// ----------------------------------------------------------------
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');

  const titles = { setup:'ADMIN', dashboard:'DASHBOARD', 'game-editor':'GAME EDITOR' };
  document.getElementById('page-title').textContent = titles[name] || 'ADMIN';
  document.getElementById('nav-dashboard').style.display = name !== 'dashboard' && groupId ? 'inline' : 'none';

  clearAlert();
}

// ----------------------------------------------------------------
// Alert helpers
// ----------------------------------------------------------------
function showAlert(msg, type='error') {
  const el = document.getElementById('global-alert');
  el.textContent = msg; el.className = `alert alert-${type} show`;
  el.scrollIntoView({ behavior:'smooth', block:'nearest' });
}
function clearAlert() { document.getElementById('global-alert').className = 'alert'; }

// ----------------------------------------------------------------
// Player setup rows (in the setup view)
// ----------------------------------------------------------------
function buildPlayerSetupRows() {
  const c = document.getElementById('player-setup-rows');
  c.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const row = document.createElement('div');
    row.className = 'player-setup-row';
    row.innerHTML = `
      <div class="dot" style="background:${PLAYER_COLORS[i+1]}"></div>
      <span class="slot">P${i+2}</span>
      <input type="text" placeholder="Player ${i+2}" maxlength="20" data-slot="${i}">
    `;
    c.appendChild(row);
  }
}

// ================================================================
// CREATE GROUP
// ================================================================
async function createGroup() {
  const gName = document.getElementById('group-name').value.trim();
  const aName = document.getElementById('admin-name').value.trim();
  if (!gName) { showAlert('Enter a group name.'); return; }
  if (!aName) { showAlert('Enter your name.'); return; }

  const playerInputs = document.querySelectorAll('#player-setup-rows input');
  const playerNames = [...playerInputs].map(i => i.value.trim()).filter(Boolean);
  if (playerNames.length === 0) { showAlert('Add at least one player.'); return; }

  const btn = document.getElementById('btn-create-group');
  btn.innerHTML = '<span class="spinner"></span>Creating...';
  btn.disabled = true;

  const { data: grp, error: ge } = await db.from('groups').insert({ name: gName, admin_name: aName }).select().single();
  if (ge) { showAlert('Error: ' + ge.message); btn.innerHTML = 'Create Group & Get Invite Links →'; btn.disabled = false; return; }

  groupId   = grp.id;
  groupName = grp.name;
  adminName = grp.admin_name;
  saveAdminGroup(groupId);

  // Admin is always player 1
  const adminPlayerRow = { group_id: groupId, name: aName, color: PLAYER_COLORS[0], claimed: true };

  // Additional players from input slots use colors starting at index 1
  const filledSlots = [...playerInputs]
    .map((inp, i) => ({ name: inp.value.trim(), color: PLAYER_COLORS[i + 1] }))
    .filter(p => p.name);

  const allPlayerRows = [adminPlayerRow, ...filledSlots.map(p => ({ group_id: groupId, name: p.name, color: p.color }))];
  const { data: insertedPlayers, error: pe } = await db.from('players').insert(allPlayerRows).select();
  if (pe) { showAlert('Error saving players: ' + pe.message); btn.innerHTML = 'Create Group & Get Invite Links →'; btn.disabled = false; return; }

  // Store admin's player session in localStorage so they can access their own board
  const adminPlayer = (insertedPlayers || []).find(p => p.name === aName && p.color === PLAYER_COLORS[0]);
  if (adminPlayer) {
    localStorage.setItem(`bingo_session_${adminPlayer.id}`, JSON.stringify({
      playerId: adminPlayer.id, playerName: adminPlayer.name,
      playerColor: adminPlayer.color, groupId
    }));
    const idx = JSON.parse(localStorage.getItem('bingo_session_index') || '[]');
    if (!idx.includes(adminPlayer.id)) idx.push(adminPlayer.id);
    localStorage.setItem('bingo_session_index', JSON.stringify(idx));
  }

  btn.innerHTML = 'Create Group & Get Invite Links →';
  btn.disabled = false;

  await loadGroup();
  switchView('dashboard');
}

// ================================================================
// LOAD GROUP
// ================================================================
async function loadGroup() {
  if (!groupId) return false;

  const { data: grp } = await db.from('groups').select('*').eq('id', groupId).single();
  if (!grp) return false;

  groupName = grp.name;
  adminName = grp.admin_name;
  saveAdminGroup(groupId);

  const url = new URL(location.href);
  url.searchParams.set('gid', groupId);
  history.replaceState({}, '', url);

  const { data: players } = await db.from('players').select('*').eq('group_id', groupId).order('joined_at');
  allPlayers = players || [];

  const { data: games } = await db.from('games').select('*').eq('group_id', groupId).order('created_at');
  allGames = games || [];

  document.getElementById('dash-group-name-display').textContent = groupName;
  renderInviteCards();
  renderGamesList();
  await loadActiveGameScores();
  subscribeRealtime();

  return true;
}

// ================================================================
// INVITE CARDS
// ================================================================
function renderInviteCards() {
  const c = document.getElementById('invite-cards');
  c.innerHTML = '';
  if (allPlayers.length === 0) {
    c.innerHTML = '<div style="color:var(--text-muted);font-size:12px;letter-spacing:1px">No players yet.</div>';
    return;
  }
  allPlayers.forEach(p => {
    const row = document.createElement('div');
    row.className = 'invite-row';
    row.innerHTML = `
      <div class="dot" style="background:${p.color}"></div>
      <span class="invite-row-name">${p.name}</span>
      <div class="invite-row-actions">
        <button class="btn btn-sm btn-outline" onclick="copyInviteLink('${p.id}','${p.name}')">📋 Copy Link</button>
        <button class="btn btn-sm btn-outline" onclick="smsInvite('${p.id}','${p.name}')">💬 Text</button>
      </div>
    `;
    c.appendChild(row);
  });
}

function copyInviteLink(pid, name) {
  navigator.clipboard.writeText(playerInviteUrl(pid));
  showAlert(`${name}'s link copied to clipboard!`, 'success');
}

function emailInvite(pid, pname) {
  const url  = playerInviteUrl(pid);
  const subj = encodeURIComponent(`You're invited to Bingo — ${groupName}`);
  const body = encodeURIComponent(
    `Hi ${pname},\n\nYou've been invited to play Implementation Team Bingo!\n\nClick your personal link to join:\n${url}\n\nYour link is unique to you — just tap it whenever the admin starts a game.\n\nGood luck!`
  );
  window.location.href = `mailto:?subject=${subj}&body=${body}`;
}

function smsInvite(pid, pname) {
  const url  = playerInviteUrl(pid);
  const body = encodeURIComponent(`Hey ${pname}! Join our bingo game here 🎯 ${url} — your link is personal, just tap it when a game starts!`);
  window.location.href = `sms:?body=${body}`;
}

function copyGroupId() {
  navigator.clipboard.writeText(groupId);
  showAlert('Group ID copied — save it somewhere to resume admin later.', 'success');
}

function copyAdminLink() {
  navigator.clipboard.writeText(adminGroupUrl(groupId));
  showAlert('Admin link copied!', 'success');
}

// ================================================================
// GAMES LIST
// ================================================================
function renderGamesList() {
  const c = document.getElementById('games-list');
  c.innerHTML = '';
  if (allGames.length === 0) {
    c.innerHTML = '<div style="color:var(--text-muted);font-size:12px;letter-spacing:1px;margin-bottom:12px">No games yet. Create your first game above.</div>';
    return;
  }
  allGames.forEach(g => {
    const card = document.createElement('div');
    card.id = `game-card-${g.id}`;
    card.className = 'game-card' + (g.status==='active' ? ' active-game' : '');

    const badgeClass  = g.status==='active' ? 'badge-active' : g.status==='finished' ? 'badge-finished' : 'badge-setup';
    const badgeLabel  = g.status.toUpperCase();

    card.innerHTML = `
      <div class="game-card-top">
        <div class="game-name">${g.name}</div>
        <span class="badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="game-meta">Round ${g.round_number} · Created ${new Date(g.created_at).toLocaleDateString()}</div>
      <div class="game-card-actions">
        <button class="btn btn-sm btn-outline" onclick="showGameEditor('${g.id}')">✏️ Edit</button>
        ${g.status !== 'active'
          ? `<button class="btn btn-sm btn-green" onclick="activateGame('${g.id}')">▶ Activate</button>`
          : `<button class="btn btn-sm btn-danger" onclick="finishGame('${g.id}')">■ End Game</button>
             <button class="btn btn-sm btn-override" id="override-btn-${g.id}" onclick="showOverrideConfirm('${g.id}')">⚡ Override Check-in</button>`
        }
      </div>
    `;
    c.appendChild(card);
  });
}

async function activateGame(gid) {
  const { error } = await db.from('games').update({ status:'active' }).eq('id', gid);
  if (error) { showAlert('Error activating game.'); return; }
  await loadGroup();
  showAlert('Game is now live!', 'success');
}

function finishGame(gid) {
  showConfirm({
    icon: '■',
    title: 'End This Game?',
    body: 'Players will immediately see a "waiting" screen and will no longer be able to mark squares. Current scores are saved. You can start a new game at any time.',
    confirmText: 'End Game',
    confirmClass: 'btn-danger',
    borderColor: 'var(--red)',
    onConfirm: async () => {
      await db.from('games').update({ status: 'finished' }).eq('id', gid);
      await loadGroup();
    }
  });
}

// ================================================================
// GAME EDITOR
// ================================================================
async function showGameEditor(gid) {
  editingGameId = gid;
  switchView('game-editor');
  document.getElementById('editor-title').textContent = gid ? 'Edit Game' : 'New Game';

  buildEditorGrid();

  if (gid) {
    const game = allGames.find(g => g.id === gid);
    if (game) document.getElementById('game-name-input').value = game.name;

    const { data: sqData } = await db.from('squares').select('*').eq('game_id', gid);
    (sqData || []).forEach(s => {
      const ta = document.querySelector(`#editor-grid textarea[data-pos="${s.position}"]`);
      if (ta) ta.value = s.text;
    });
  } else {
    document.getElementById('game-name-input').value = `Game ${allGames.length + 1}`;
    const exampleSquares = ["A Pencil Sharpener", "A Blood Pressure Cuff"];
    let sqIdx = 0;
    document.querySelectorAll('#editor-grid textarea').forEach(ta => {
      ta.value = exampleSquares[sqIdx++] || '';
    });
  }
}

function buildEditorGrid() {
  const grid = document.getElementById('editor-grid');
  grid.innerHTML = '';
  for (let pos = 0; pos < 9; pos++) {
    const wrap = document.createElement('div');
    wrap.className = 'sq-wrap';
    const num  = document.createElement('span');
    num.className = 'sq-pos'; num.textContent = pos + 1;
    const ta   = document.createElement('textarea');
    ta.className = 'sq-ta'; ta.dataset.pos = pos; ta.rows = 4;
    ta.placeholder = `Square ${pos + 1}`;
    wrap.appendChild(num); wrap.appendChild(ta);
    grid.appendChild(wrap);
  }
}

async function saveGame(andActivate) {
  const gameName = document.getElementById('game-name-input').value.trim();
  if (!gameName) { showAlert('Enter a game name.'); return; }

  const tas = document.querySelectorAll('#editor-grid textarea');
  const squareRows = [];
  tas.forEach(ta => {
    squareRows.push({ position: +ta.dataset.pos, text: ta.value.trim() || '(blank)' });
  });

  const btn = document.getElementById('btn-save-activate');
  btn.innerHTML = '<span class="spinner"></span>Saving...';
  btn.disabled = true;

  let gameId = editingGameId;

  if (!gameId) {
    const roundNumber = allGames.length + 1;
    const { data: newGame, error } = await db.from('games').insert({
      group_id: groupId,
      name: gameName,
      status: andActivate ? 'active' : 'setup',
      round_number: roundNumber
    }).select().single();
    if (error) { showAlert('Error creating game: ' + error.message); btn.innerHTML = 'Save & Activate 🎯'; btn.disabled = false; return; }
    gameId = newGame.id;
  } else {
    await db.from('games').update({ name: gameName }).eq('id', gameId);
    if (andActivate) {
      await db.from('games').update({ status:'active' }).eq('id', gameId);
    }
  }

  await db.from('squares').delete().eq('game_id', gameId);
  await db.from('squares').insert(squareRows.map(s => ({ game_id: gameId, ...s })));

  btn.innerHTML = 'Save & Activate 🎯';
  btn.disabled = false;

  await loadGroup();
  switchView('dashboard');
  showAlert(andActivate ? 'Game activated! Players will see it now.' : 'Game saved as draft.', 'success');
}

// ================================================================
// LIVE SCOREBOARD (admin view)
// ================================================================
async function loadActiveGameScores() {
  const activeGames = allGames.filter(g => g.status === 'active');
  const section = document.getElementById('scoreboard-section');
  const banner  = document.getElementById('play-banner');

  if (activeGames.length === 0) {
    section.style.display = 'none';
    banner.style.display  = 'none';
    activeGameId = null;
    scoreboardGameId = null;
    return;
  }

  // Keep current tab selection if still valid, otherwise pick first active game
  if (!scoreboardGameId || !activeGames.find(g => g.id === scoreboardGameId)) {
    scoreboardGameId = activeGames[0].id;
  }
  activeGameId = scoreboardGameId;
  const activeGame = activeGames.find(g => g.id === activeGameId);

  section.style.display = 'block';
  document.getElementById('sb-game-name').textContent = activeGame.name;

  // Render tabs when multiple games are active
  const tabsEl = document.getElementById('sb-game-tabs');
  if (activeGames.length > 1) {
    tabsEl.style.display = 'flex';
    tabsEl.innerHTML = activeGames.map(g =>
      `<button class="sb-tab${g.id === activeGameId ? ' active' : ''}" onclick="switchScoreboardGame('${g.id}')">${g.name}</button>`
    ).join('');
  } else {
    tabsEl.style.display = 'none';
  }

  // Show lobby button if this device has a player session
  const mySessionIds = new Set(JSON.parse(localStorage.getItem('bingo_session_index') || '[]'));
  const myPlayer = allPlayers.find(p => mySessionIds.has(p.id));
  if (myPlayer) {
    document.getElementById('play-lobby-btn').href = playerInviteUrl(myPlayer.id);
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }

  const { data: markData } = await db.from('marks').select('*').eq('game_id', activeGameId);
  allMarks = {};
  allPlayers.forEach(p => { allMarks[p.id] = new Set(); });
  (markData || []).forEach(m => {
    if (allMarks[m.player_id]) allMarks[m.player_id].add(m.position);
  });

  adminFirstStraightId = null;
  adminFirstDiagId     = null;
  const { data: fleRows } = await db.from('first_line_events')
    .select('player_id, line_type, created_at')
    .eq('game_id', activeGameId)
    .order('created_at', { ascending: true });
  for (const row of (fleRows || [])) {
    if (row.line_type === 'straight' && !adminFirstStraightId) adminFirstStraightId = row.player_id;
    if (row.line_type === 'diagonal' && !adminFirstDiagId) adminFirstDiagId = row.player_id;
  }

  adminCheckedInIds = new Set();
  const { data: ciRows } = await db.from('check_ins').select('player_id').eq('game_id', activeGameId);
  (ciRows || []).forEach(r => adminCheckedInIds.add(r.player_id));

  renderAdminScoreboard();
}

async function switchScoreboardGame(gid) {
  scoreboardGameId = gid;
  await loadActiveGameScores();
}

function renderAdminScoreboard() {
  const c = document.getElementById('admin-scoreboard');
  c.innerHTML = '';
  const sorted = [...allPlayers].sort((a,b) => {
    const ab = (allMarks[a.id]||new Set()).size === 9;
    const bb = (allMarks[b.id]||new Set()).size === 9;
    if (ab && !bb) return -1; if (!ab && bb) return 1;
    return (allMarks[b.id]||new Set()).size - (allMarks[a.id]||new Set()).size;
  });
  sorted.forEach(p => {
    const marks      = allMarks[p.id] || new Set();
    const count      = marks.size;
    const bingo      = count === 9;
    const pct        = Math.round(count / 9 * 100);
    const firstLine  = !bingo && p.id === adminFirstStraightId;
    const firstDiag  = !bingo && !firstLine && p.id === adminFirstDiagId;

    const rightBadge = bingo
      ? '<div class="sb-bingo">PROOFINGO 🎯</div>'
      : firstLine
        ? '<div class="sb-first-line">1ST LINE 🏁</div>'
        : firstDiag
          ? '<div class="sb-first-diag">1ST DIAG ⚡</div>'
          : `<div class="sb-count">${count}/9</div>`;

    const row = document.createElement('div');
    row.className = 'sb-row';
    row.innerHTML = `
      <div class="sb-dot" style="background:${p.color}"></div>
      <div class="sb-name">${p.name}</div>
      <div class="sb-bar-bg"><div class="sb-bar-fill${bingo?' bingo':''}" style="width:${pct}%"></div></div>
      ${rightBadge}
    `;
    c.appendChild(row);
  });
}

// ================================================================
// GENERIC CONFIRM MODAL
// ================================================================
let _pendingConfirm = null;

function showConfirm({ icon, title, body, confirmText, confirmClass, borderColor, onConfirm }) {
  _pendingConfirm = onConfirm;
  document.getElementById('confirm-icon').textContent  = icon || '⚠️';
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent  = body;
  const btn = document.getElementById('confirm-action-btn');
  btn.textContent = confirmText;
  btn.className   = `btn btn-sm ${confirmClass || 'btn-danger'}`;
  btn.disabled    = false;
  document.getElementById('confirm-box').style.borderColor = borderColor || '';
  document.getElementById('confirm-modal').classList.add('show');
}

function closeConfirmModal() {
  document.getElementById('confirm-modal').classList.remove('show');
  _pendingConfirm = null;
}

async function runConfirmAction() {
  if (!_pendingConfirm) return;
  const btn = document.getElementById('confirm-action-btn');
  if (btn) btn.disabled = true;
  await _pendingConfirm();
  closeConfirmModal();
}

function showOverrideConfirm(gid) {
  showConfirm({
    icon: '⚡',
    title: 'Override Check-In?',
    body: 'This will mark all players as checked in and allow everyone to enter the game — even if they haven\'t tapped "I\'m Ready" yet. Use this if a player is having trouble checking in.',
    confirmText: 'Override & Start',
    confirmClass: 'btn-override',
    borderColor: '#f5c400',
    onConfirm: async () => {
      const rows = allPlayers.map(p => ({ game_id: gid, player_id: p.id }));
      await db.from('check_ins').upsert(rows, { onConflict: 'game_id,player_id' });
    }
  });
}

// ================================================================
// REALTIME
// ================================================================
function subscribeRealtime() {
  if (realtimeChannel) db.removeChannel(realtimeChannel);

  realtimeChannel = db.channel(`admin-group-${groupId}`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'marks'
    }, payload => {
      if (!activeGameId) return;
      const { eventType, new: n, old: o } = payload;
      const pid = (n && n.player_id) || (o && o.player_id);
      const gid = (n && n.game_id)   || (o && o.game_id);
      if (gid !== activeGameId) return;
      if (!allMarks[pid]) allMarks[pid] = new Set();
      if (eventType === 'INSERT') allMarks[pid].add(n.position);
      if (eventType === 'DELETE') allMarks[pid].delete(o.position);
      renderAdminScoreboard();
    })
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'check_ins'
    }, payload => {
      const ci = payload.new;
      if (!ci || ci.game_id !== activeGameId) return;
      adminCheckedInIds.add(ci.player_id);
    })
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public', table: 'games',
      filter: `group_id=eq.${groupId}`
    }, async () => {
      const { data: games } = await db.from('games').select('*').eq('group_id', groupId).order('created_at');
      allGames = games || [];
      renderGamesList();
      await loadActiveGameScores();
    })
    .subscribe();
}

function showDashboard() {
  switchView('dashboard');
}

function endGroup() {
  showConfirm({
    icon: '⊗',
    title: `End "${groupName}"?`,
    body: 'This permanently deletes all games, scores, and player invite links. Anyone who taps an old invite link will see "group has ended". This cannot be undone.',
    confirmText: 'End Group',
    confirmClass: 'btn-danger',
    borderColor: 'var(--red)',
    onConfirm: async () => {
      const { error } = await db.from('groups').delete().eq('id', groupId);
      if (error) { closeConfirmModal(); showAlert('Error ending group: ' + error.message); return; }
      const index = JSON.parse(localStorage.getItem('bingo_admin_index') || '[]');
      localStorage.setItem('bingo_admin_index', JSON.stringify(index.filter(id => id !== groupId)));
      if (localStorage.getItem('bingo_admin_gid') === groupId) localStorage.removeItem('bingo_admin_gid');
      window.location.href = 'index.html';
    }
  });
}
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
}
